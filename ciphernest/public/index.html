<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherNest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c20;
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.12);
  --accent: #5fffb0;
  --danger: #ff5c5c;
  --text: #ececf0;
  --muted: #5a5a6a;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

.wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

header { margin-bottom: 3.5rem; }

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--accent);
}

.logo span { color: var(--muted); font-weight: 300; }

/* Drop zone */
.drop-zone {
  border: 1px solid var(--border-hi);
  border-radius: 14px;
  padding: 4rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface);
  position: relative;
  margin-bottom: 2.5rem;
}

.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(95,255,176,0.03);
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.drop-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.25rem;
  color: var(--muted);
  transition: color 0.2s;
}

.drop-zone:hover .drop-icon, .drop-zone.over .drop-icon { color: var(--accent); }

.drop-title {
  font-size: 0.93rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.3rem;
}

.drop-sub {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
}

/* Progress */
.progress-wrap { display: none; margin-bottom: 2rem; }
.progress-wrap.active { display: block; }

.progress-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.progress-track { height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* File list */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}

.list-label {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.list-count {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
}

.file-list { display: flex; flex-direction: column; gap: 6px; }

.file-row {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.875rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.15s;
  animation: fadein 0.2s ease;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.file-row:hover { border-color: var(--border-hi); }

.file-type-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--muted);
}

.file-info { flex: 1; min-width: 0; }

.file-name {
  font-size: 0.84rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.file-meta {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  display: flex;
  gap: 10px;
}

.file-actions { display: flex; gap: 5px; flex-shrink: 0; }

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.icon-btn:hover { border-color: var(--border-hi); color: var(--text); background: var(--surface2); }
.icon-btn.danger:hover { border-color: rgba(255,92,92,0.3); color: var(--danger); background: rgba(255,92,92,0.06); }

.empty {
  text-align: center;
  padding: 2.5rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  border: 1px dashed var(--border);
  border-radius: 10px;
}

/* Modal */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-bg.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 16px;
  padding: 1.75rem;
  width: 100%;
  max-width: 400px;
  margin: 1rem;
}

.modal-title {
  font-size: 0.88rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.modal-sub {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-sub strong { color: var(--text); font-weight: 400; }

.pw-row { position: relative; margin-bottom: 0.6rem; }

.pw-row input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: 9px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 0.65rem 2.6rem 0.65rem 0.9rem;
  outline: none;
  transition: border-color 0.15s;
}

.pw-row input:focus { border-color: rgba(95,255,176,0.4); }

.pw-eye {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 4px;
  display: flex;
  align-items: center;
}

.pw-eye:hover { color: var(--text); }

.strength { display: flex; gap: 4px; margin-bottom: 1.25rem; }

.strength-bar {
  flex: 1;
  height: 2px;
  border-radius: 2px;
  background: var(--border-hi);
  transition: background 0.25s;
}

.modal-actions { display: flex; gap: 7px; }

.btn {
  flex: 1;
  padding: 0.6rem 1rem;
  border-radius: 9px;
  font-family: var(--sans);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-hi);
  background: transparent;
  color: var(--muted);
  transition: all 0.15s;
}

.btn:hover { color: var(--text); background: var(--surface2); }

.btn-primary {
  background: var(--accent);
  color: #0c0c0e;
  border-color: var(--accent);
  font-weight: 600;
}

.btn-primary:hover { background: #80ffca; border-color: #80ffca; }

/* Toast */
#toast {
  position: fixed;
  bottom: 1.75rem;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 7px 16px;
  border-radius: 100px;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok  { color: var(--accent); border-color: rgba(95,255,176,0.25); }
#toast.err { color: var(--danger); border-color: rgba(255,92,92,0.25); }

@media (max-width: 520px) {
  .file-meta { flex-direction: column; gap: 1px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">CipherNest<span>.local</span></div>
  </header>

  <div class="drop-zone" id="dropzone">
    <input type="file" id="fileInput" multiple />
    <div class="drop-icon">
      <i data-lucide="upload-cloud" style="width:42px;height:42px;stroke-width:1.2"></i>
    </div>
    <div class="drop-title">Drop files here</div>
    <div class="drop-sub">or click to browse</div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-name"></span>
      <span id="progress-pct"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="list-header">
    <span class="list-label">Files</span>
    <span class="list-count" id="file-count"></span>
  </div>
  <div class="file-list" id="file-list">
    <div class="empty">Nothing stored yet</div>
  </div>

</div>

<!-- Password modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title">Encrypt file</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="pw-row">
      <input type="password" id="pw-input" placeholder="Password" autocomplete="off" />
      <button class="pw-eye" id="pw-eye" tabindex="-1">
        <i data-lucide="eye" style="width:14px;height:14px;stroke-width:1.75"></i>
      </button>
    </div>
    <div class="strength">
      <div class="strength-bar" id="sb1"></div>
      <div class="strength-bar" id="sb2"></div>
      <div class="strength-bar" id="sb3"></div>
      <div class="strength-bar" id="sb4"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Continue</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
lucide.createIcons();

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2600);
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function lucideIconName(mime) {
  if (!mime) return 'file';
  if (mime.startsWith('image/')) return 'image';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'music';
  if (mime.includes('pdf')) return 'file-text';
  if (mime.includes('zip') || mime.includes('tar') || mime.includes('gz')) return 'archive';
  if (mime.includes('text') || mime.includes('json') || mime.includes('xml')) return 'file-code-2';
  return 'file';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal promise interface ──
let _resolve = null;

function askPassword(title, sub) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').innerHTML = sub;
  document.getElementById('pw-input').value = '';
  ['sb1','sb2','sb3','sb4'].forEach(id => document.getElementById(id).style.background = '');
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 60);
  return new Promise(res => { _resolve = res; });
}

function closeModal(val) {
  document.getElementById('modal-bg').classList.remove('open');
  if (_resolve) { _resolve(val); _resolve = null; }
}

document.getElementById('modal-cancel').addEventListener('click', () => closeModal(null));
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(null); });
document.getElementById('modal-confirm').addEventListener('click', () => {
  const pw = document.getElementById('pw-input').value;
  if (!pw) { document.getElementById('pw-input').focus(); return; }
  closeModal(pw);
});
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-confirm').click();
  if (e.key === 'Escape') closeModal(null);
});

// eye toggle
let eyeOn = false;
document.getElementById('pw-eye').addEventListener('click', () => {
  eyeOn = !eyeOn;
  document.getElementById('pw-input').type = eyeOn ? 'text' : 'password';
  const iconName = eyeOn ? 'eye-off' : 'eye';
  document.getElementById('pw-eye').innerHTML =
    `<i data-lucide="${iconName}" style="width:14px;height:14px;stroke-width:1.75"></i>`;
  lucide.createIcons();
});

// strength bars
document.getElementById('pw-input').addEventListener('input', function() {
  const pw = this.value;
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 16) s++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const cols = ['','#ff5c5c','#f59e0b','#facc15','#5fffb0'];
  ['sb1','sb2','sb3','sb4'].forEach((id,i) => {
    document.getElementById(id).style.background = i < s ? cols[s] : 'var(--border-hi)';
  });
});

// ── Drop zone ──
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) handleFiles(files);
});
document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files.length) handleFiles(Array.from(this.files));
  this.value = '';
});

// ── Upload ──
async function handleFiles(files) {
  const label = files.length === 1 ? files[0].name : `${files.length} files`;
  const pw = await askPassword(
    'Set a password',
    `Encrypting <strong>${escHtml(label)}</strong>`
  );
  if (!pw) return;

  const wrap  = document.getElementById('progress-wrap');
  const fill  = document.getElementById('progress-fill');
  const pname = document.getElementById('progress-name');
  const ppct  = document.getElementById('progress-pct');

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    wrap.classList.add('active');
    pname.textContent = file.name;
    ppct.textContent  = files.length > 1 ? `${i+1} / ${files.length}` : '';
    fill.style.width  = '15%';

    const fd = new FormData();
    fd.append('file', file);
    fd.append('password', pw);

    try {
      fill.style.width = '55%';
      const res  = await fetch('/api/upload', { method:'POST', body:fd });
      fill.style.width = '95%';
      const data = await res.json();
      if (data.error) toast(data.error, 'err');
      else { fill.style.width = '100%'; toast(`Stored: ${file.name}`); }
    } catch { toast('Upload failed', 'err'); }
  }

  setTimeout(() => { wrap.classList.remove('active'); fill.style.width = '0%'; }, 500);
  loadFiles();
}

// ── File list ──
async function loadFiles() {
  const res   = await fetch('/api/files');
  const files = await res.json();
  const list  = document.getElementById('file-list');
  const count = document.getElementById('file-count');

  count.textContent = files.length ? `${files.length} file${files.length !== 1 ? 's' : ''}` : '';

  if (!files.length) {
    list.innerHTML = '<div class="empty">Nothing stored yet</div>';
    return;
  }

  list.innerHTML = files.map(f => `
    <div class="file-row">
      <div class="file-type-icon">
        <i data-lucide="${lucideIconName(f.mimeType)}" style="width:15px;height:15px;stroke-width:1.5"></i>
      </div>
      <div class="file-info">
        <div class="file-name">${escHtml(f.originalName)}</div>
        <div class="file-meta">
          <span>${fmtSize(f.size)}</span>
          <span>${fmtDate(f.uploadedAt)}</span>
        </div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" title="Download" onclick="downloadFile('${f.id}','${escHtml(f.originalName)}')">
          <i data-lucide="download" style="width:14px;height:14px;stroke-width:1.75"></i>
        </button>
        <button class="icon-btn danger" title="Delete" onclick="deleteFile('${f.id}')">
          <i data-lucide="trash-2" style="width:14px;height:14px;stroke-width:1.75"></i>
        </button>
      </div>
    </div>
  `).join('');

  lucide.createIcons();
}

// ── Download ──
async function downloadFile(fileId, fileName) {
  const pw = await askPassword(
    'Enter password',
    `Decrypting <strong>${escHtml(fileName)}</strong>`
  );
  if (!pw) return;

  try {
    const res = await fetch(`/api/download/${fileId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });

    if (!res.ok) {
      const err = await res.json();
      toast(err.error || 'Wrong password', 'err');
      return;
    }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
    toast(`Downloaded`);
  } catch { toast('Download failed', 'err'); }
}

// ── Delete ──
async function deleteFile(fileId) {
  if (!confirm('Permanently delete this file?')) return;
  const res  = await fetch(`/api/files/${fileId}`, { method:'DELETE' });
  const data = await res.json();
  if (data.success) { toast('Deleted'); loadFiles(); }
  else toast(data.error || 'Delete failed', 'err');
}

loadFiles();
setInterval(loadFiles, 12000);
</script>
</body>
</html>
